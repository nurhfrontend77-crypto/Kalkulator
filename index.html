<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <h2>Калькулятор</h2>
        
        <div class="inputs">
            <input type="number" id="num1" placeholder="Биринчи цифра">
            <input type="number" id="num2" placeholder="Экинчи цифра">
        </div>

        <div class="buttons">
            <button class="btn btn-operator">+</button>
            <button class="btn btn-operator">-</button>
            <button class="btn btn-operator">*</button>
            <button class="btn btn-operator">:</button>
        </div>

        <div class="result" id="result">Жыйынтык: 0</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
